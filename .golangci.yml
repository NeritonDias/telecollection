version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - gosec # security issues (required — security is a project constraint)
    - misspell # typos in comments/strings
    - revive # style/lint
  exclusions:
    rules:
      # Test files may use weaker patterns / ignore some errors deliberately.
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
